<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign In or Create an Account</title>
  <style>
    body {
      background-color: #0b1221;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .auth-container {
      background-color: #161e2e;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      margin-top: 0;
      font-size: 24px;
      color: #f9fafb;
    }
    p {
      color: #9ca3af;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .auth-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #93c5fd;
      font-size: 13px;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .auth-status:empty {
      margin-bottom: 0;
    }
    .auth-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.45);
      color: #fecaca;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .spinner {
      width: 12px;
      height: 12px;
      border-radius: 9999px;
      border: 2px solid #334155;
      border-top-color: #60a5fa;
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }
    .spinner.hidden {
      display: none;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px;
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: white;
      box-sizing: border-box;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    button {
      flex: 1;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s;
    }
    #sign-in-btn {
      background-color: #1f2937;
      color: white;
      border: 1px solid #374151;
    }
    #sign-in-btn:hover {
      background-color: #374151;
    }
    #sign-up-btn {
      background-color: #e5e7eb;
      color: #111827;
    }
    #sign-up-btn:hover {
      background-color: #f3f4f6;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <h2>Sign in or create an account</h2>
    <p>Use separate logins and share one calendar with a private invite link.</p>
    <div id="auth-status" class="auth-status" aria-live="polite">
      <span id="auth-spinner" class="spinner" aria-hidden="true"></span>
      <span id="auth-status-text">Checking your session…</span>
    </div>
    <div id="auth-error" class="auth-error" role="alert" aria-live="assertive" hidden></div>

    <form id="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm password (for sign up)</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password">
      </div>

      <div class="btn-group">
        <button type="button" id="sign-in-btn">Sign in</button>
        <button type="button" id="sign-up-btn">Sign up</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { signInWithEmail, signUpWithEmail, observeAuthState } from './auth.js';

    // Elements
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const signInBtn = document.getElementById('sign-in-btn');
    const signUpBtn = document.getElementById('sign-up-btn');
    const authStatusText = document.getElementById('auth-status-text');
    const authSpinner = document.getElementById('auth-spinner');
    const authError = document.getElementById('auth-error');
    let authStateChecked = false;

    function setAuthBusy(message, busy) {
      authStatusText.textContent = message;
      authSpinner.classList.toggle('hidden', !busy);
      signInBtn.disabled = busy;
      signUpBtn.disabled = busy;
    }

    function setAuthError(message) {
      authError.textContent = message;
      authError.hidden = !message;
    }

    function getAppRedirectUrl() {
      const params = new URLSearchParams(window.location.search);
      const redirect = new URL('index.html', window.location.href);
      redirect.searchParams.set('app', '1');
      if (params.get('share') && params.get('code')) {
        redirect.searchParams.set('share', params.get('share'));
        redirect.searchParams.set('code', params.get('code'));
      }
      return redirect.toString();
    }

    // 1. If a user is already logged in, redirect them immediately to the app page
    observeAuthState((user) => {
      if (user) {
        setAuthBusy('Redirecting you to your planner…', true);
        window.location.href = getAppRedirectUrl();
        return;
      }

      if (!authStateChecked) {
        authStateChecked = true;
        setAuthBusy('', false);
      }
    });

    // 2. Handle Sign In Action
    signInBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      setAuthError('');
      
      if (!emailInput.value || !passwordInput.value) {
        setAuthError('Please fill out both Email and Password fields.');
        return;
      }

      try {
        setAuthBusy('Signing in…', true);
        await signInWithEmail(emailInput.value, passwordInput.value);
        // Success: The observeAuthState listener above will handle the automatic redirect
      } catch (error) {
        setAuthBusy('', false);
        setAuthError(`Sign in error: ${error.message}`);
      }
    });

    // 3. Handle Sign Up Action
    signUpBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      setAuthError('');

      if (!emailInput.value || !passwordInput.value) {
        setAuthError('Please fill out both Email and Password fields to register.');
        return;
      }

      if (passwordInput.value !== confirmPasswordInput.value) {
        setAuthError('Passwords do not match. Please confirm your password.');
        return;
      }

      try {
        setAuthBusy('Creating your account…', true);
        await signUpWithEmail(emailInput.value, passwordInput.value);
        // Success: Automatic redirect via the observer state change
      } catch (error) {
        setAuthBusy('', false);
        setAuthError(`Sign up error: ${error.message}`);
      }
    });
  </script>

</body>
</html>
